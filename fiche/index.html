<body>

  <noscript>
    <div style="padding:3rem;text-align:center;font-family:sans-serif">
      <h1>Fiche projet</h1>
      <p>JavaScript requis. <a href="/">Retour à l'accueil</a></p>
    </div>
  </noscript>

  <!-- ═══════════════════ APP SHELL ═══════════════════ -->
  <div id="fv2" class="fv2">

    <!-- ─── Topbar ─── -->
    <nav class="fv2-topbar" id="fv2-topbar">

      <!-- Bouton retour -->
      <a href="/" id="fv2-btn-back" class="fv2-topbar__back fv2-chip" aria-label="Retour à la carte">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Retour</span>
      </a>

      <!-- Titre projet (visible uniquement sur scroll) -->
      <span class="fv2-topbar__title" id="fv2-topbar-title"></span>

      <!-- Groupe droite -->
      <div class="fv2-topbar__end">
        <!-- Logo ville (affiché si branding chargé) -->
        <div class="fv2-topbar__logo fv2-chip" id="fv2-topbar-logo" hidden>
          <img id="fv2-topbar-logo-img" src="" alt="">
        </div>
        <!-- Boutons actions -->
        <div class="fv2-chip fv2-topbar__btns">
          <button type="button" class="fv2-topbar__btn" id="fv2-btn-theme" aria-label="Changer le thème">
            <i class="fa-solid fa-moon"></i>
          </button>
          <span class="fv2-topbar__sep" aria-hidden="true"></span>
          <button type="button" class="fv2-topbar__btn" id="fv2-btn-share" aria-label="Copier le lien">
            <i class="fa-solid fa-link"></i>
          </button>
        </div>
      </div>

    </nav>

    <!-- ─── Hero : carte en fond ─── -->
    <header class="fv2-hero" id="fv2-hero">
      <!-- Carte en fond du héro -->
      <div id="fv2-map" class="fv2-hero__map"></div>
      <!-- Scrim : dégradé pour lisibilité du texte -->
      <div class="fv2-hero__scrim"></div>
      <div class="fv2-hero__inner" id="fv2-hero-inner">
        <!-- Skeleton placeholders -->
        <div class="fv2-hero__meta">
          <span class="fv2-skel fv2-skel--pill"></span>
        </div>
        <div class="fv2-skel fv2-skel--h1"></div>
        <div class="fv2-skel fv2-skel--h1 fv2-skel--short"></div>
      </div>
    </header>

    <!-- ─── Body: Main + Sidebar ─── -->
    <div class="fv2-body" id="fv2-body">

      <!-- Main column -->
      <main class="fv2-main" id="fv2-main">

        <!-- Description -->
        <section class="fv2-block" id="fv2-desc-block">
          <div class="fv2-skel fv2-skel--line"></div>
          <div class="fv2-skel fv2-skel--line fv2-skel--w70"></div>
        </section>

        <!-- Photo de couverture -->
        <section class="fv2-block fv2-block--bleed" id="fv2-cover-block" hidden>
          <div class="fv2-cover">
            <img class="fv2-cover__img" id="fv2-cover-img" src="" alt="" loading="eager">
            <button type="button" class="fv2-hero__expand" id="fv2-btn-cover-expand" aria-label="Agrandir la photo">
              <i class="fa-solid fa-expand"></i>
            </button>
          </div>
        </section>

        <!-- Prose / Markdown -->
        <section class="fv2-block" id="fv2-prose-block" hidden>
          <article class="fv2-prose" id="fv2-prose"></article>
        </section>

        <!-- Related projects -->
        <section class="fv2-block" id="fv2-related-block" hidden>
          <h2 class="fv2-section-title"><i class="fa-solid fa-compass"></i> Découvrir aussi</h2>
          <div class="fv2-related" id="fv2-related"></div>
        </section>

      </main>

      <!-- Sidebar (desktop sticky) -->
      <aside class="fv2-aside" id="fv2-aside">

        <!-- City branding card — glass -->
        <div class="fv2-glass-card fv2-glass-card--brand" id="fv2-brand-card" hidden>
          <img class="fv2-glass-card__city-logo" id="fv2-city-logo" src="" alt="">
          <span class="fv2-glass-card__city-name" id="fv2-city-name"></span>
        </div>

        <!-- Official link — glass -->
        <a class="fv2-glass-card fv2-glass-card--link" id="fv2-link-card" href="#" target="_blank" rel="noopener noreferrer" hidden>
          <img class="fv2-glass-card__favicon" id="fv2-link-favicon" src="" alt="">
          <div class="fv2-glass-card__link-text">
            <span class="fv2-glass-card__link-label">Site officiel</span>
            <span class="fv2-glass-card__link-domain" id="fv2-link-domain"></span>
          </div>
          <i class="fa-solid fa-arrow-up-right-from-square fv2-glass-card__link-arrow"></i>
        </a>

        <!-- Documents — glass -->
        <div class="fv2-glass-card" id="fv2-docs-card" hidden>
          <h3 class="fv2-glass-card__heading"><i class="fa-solid fa-folder-open"></i> Documents</h3>
          <div class="fv2-docs" id="fv2-docs"></div>
        </div>

      </aside>

    </div><!-- .fv2-body -->

    <!-- ─── Error state ─── -->
    <div class="fv2-error" id="fv2-error" hidden>
      <div class="fv2-error__icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <h1 class="fv2-error__title" id="fv2-error-title"></h1>
      <p class="fv2-error__msg" id="fv2-error-msg"></p>
      <a href="/" id="fv2-btn-back-error" class="fv2-btn-3d fv2-btn-3d--primary">Retour à la carte</a>
    </div>

  </div><!-- #fv2 -->

  <!-- ═══════════════════ OVERLAYS ═══════════════════ -->

  <!-- PDF preview -->
  <div class="fv2-overlay" id="fv2-ov-pdf" aria-hidden="true">
    <div class="fv2-overlay__bar">
      <span class="fv2-overlay__title" id="fv2-pdf-title">Document</span>
      <button type="button" class="fv2-overlay__close" data-close aria-label="Fermer">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="fv2-overlay__body">
      <iframe id="fv2-pdf-frame" title="PDF" style="width:100%;height:100%;border:none"></iframe>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="fv2-lightbox" id="fv2-lightbox" aria-hidden="true">
    <img id="fv2-lb-img" src="" alt="">
    <button type="button" class="fv2-lightbox__close" data-close aria-label="Fermer">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>
