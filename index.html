        <i class="fas fa-ellipsis-v" aria-hidden="true"></i>
      </button>

    <div id="basemap-menu" class="dock-panel" data-toggle="basemap"></div>

    <!-- Search panel -->
    <div id="search-overlay" class="dock-panel dock-panel--search" data-toggle="search">
      <div class="dock-panel__header">
        <span class="dock-panel__title">Rechercher</span>
        <button class="dock-panel__close" aria-label="Fermer la recherche"><i class="fas fa-times"></i></button>
