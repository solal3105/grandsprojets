[build]
  command = "cd home-src && npm ci && npm run build"
  publish = "."
  edge_functions = "netlify/edge-functions"

[functions]
  directory = "netlify/functions"

# ============================================
# Edge Functions — pré-rendu SEO
# ============================================

[[edge_functions]]
  path = "/fiche/"
  function = "fiche-ssr"

# Prerendering pour les crawlers (Google, Bing, etc.)
# Netlify sert une version pré-rendue du SPA aux bots
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

# ============================================
# Redirections sous-domaines → ?city=
# ============================================

[[redirects]]
  from = "https://lumieres.grandsprojets.com/*"
  to = "https://grandsprojets.com/:splat?city=lumieres"
  status = 301
  force = true

# Ajouter d'autres villes ici si besoin :
# [[redirects]]
#   from = "https://keolis.grandsprojets.com/*"
#   to = "https://grandsprojets.com/:splat?city=keolis"
#   status = 301
#   force = true

# ============================================
# Fonctions Netlify
# ============================================

# ============================================
# Fonctions exposées sous /api/
# ============================================

[[redirects]]
  from = "/api/ai-generate"
  to = "/.netlify/functions/ai-generate"
  status = 200
  force = true

# Force the dynamic function over any static file with the same path
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
  force = true
